        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function handleHitlResponse(sess, action) {
            if (sess.eventSource) { sess.eventSource.close(); sess.eventSource = null; }
            resetStreamState(sess);

            sess.isStreaming = true;
            if (sess.sessionId === activeSessionId) {
                isStreaming = true;
                setBtnStopMode();
            }

            var url = SSE_ENDPOINT + '?hitlAction=' + encodeURIComponent(action)
                + '&sessionId=' + encodeURIComponent(sess.sessionId);

            sess.eventSource = new EventSource(url);
            sess.eventSource.onmessage = function(event) { handleSSEData(sess, event.data); };
            sess.eventSource.onerror = function(err) {
                console.error("SSE Error:", err);
                // 显式关闭，防止浏览器自动重连
                if (sess.eventSource) {
                    sess.eventSource.close();
                    sess.eventSource = null;
                }
                finishStream(sess);
            };
        }

        /* ===== Send ===== */
        function sendMessage() {
            var text = getInputText();
            if (!text && !pendingFile) return;
            /* Block only if the active session is currently streaming */
            if (activeSessionId && sessionMap[activeSessionId] && sessionMap[activeSessionId].isStreaming) return;

            var imageDataUrl = null;
            if (pendingFile && pendingFile.type === 'image') {
                // Generate dataUrl for display only (from stored preview)
                var previewEl = inChatMode ? chatImgPreview : welcomeImgPreview;
                imageDataUrl = previewEl.src;
            }
            var fileAttachment = pendingFile;

            // Build final input text
            var finalText = text;
            if (fileAttachment && fileAttachment.type === 'text') {
                finalText = '[文件: ' + fileAttachment.name + ']\n' + fileAttachment.content + '\n\n' + (text || '请帮我处理这个文件');
            } else if (fileAttachment && fileAttachment.type === 'binary') {
                finalText = '[附件: ' + fileAttachment.name + ']\n' + (text || '请帮我处理这个附件');
            } else if (fileAttachment && fileAttachment.type === 'image') {
                if (!finalText) finalText = '请描述这张图片';
            }
            if (!finalText) finalText = '请描述这张图片';

            if (currentChatIndex === -1) {
                saveChatToHistory(finalText);
            }

            clearInput();
            clearAttachmentPreview();
            if (!inChatMode) switchToChatMode();
            setActiveSession(SESSION_ID);

            var sess = sessionMap[SESSION_ID];

            // Show user message with appropriate preview
            if (imageDataUrl) {
                appendUserMessage(sess, finalText, imageDataUrl);
            } else if (fileAttachment && (fileAttachment.type === 'text' || fileAttachment.type === 'binary')) {
                appendUserMessage(sess, finalText, null, fileAttachment);
            } else {
                appendUserMessage(sess, finalText);
            }

            sess.isStreaming = true;
            isStreaming = true;
            setBtnStopMode();
            resetStreamState(sess);
            showThinking(sess);

            sendWithFormData(sess, finalText, fileAttachment);
        }

        function sendWithFormData(sess, text, fileAttachment) {
            if (sess.eventSource) { sess.eventSource.close(); sess.eventSource = null; }
            var model = getSelectedModel();
            var formData = new FormData();
            formData.append('input', text);
            formData.append('sessionId', sess.sessionId);
            if (model) formData.append('model', model);
            if (fileAttachment) {
                formData.append('attachment', fileAttachment.file, fileAttachment.name);
            }

            var abortCtrl = new AbortController();
            sess.eventSource = { close: function() { abortCtrl.abort(); } };

            fetch(SSE_ENDPOINT, {
                method: 'POST',
                signal: abortCtrl.signal,
                body: formData
            }).then(function(resp) {
                var reader = resp.body.getReader();
                var decoder = new TextDecoder();
                var buffer = '';

                function pump() {
                    reader.read().then(function(result) {
                        if (result.done) { finishStream(sess); return; }
                        buffer += decoder.decode(result.value, { stream: true });
                        var lines = buffer.split('\n');
                        buffer = lines.pop();
                        for (var i = 0; i < lines.length; i++) {
                            var line = lines[i].trim();
                            if (line.length === 0) continue;
                            if (line.startsWith('data:')) {
                                var raw = line.substring(5).trim();
                                handleSSEData(sess, raw);
                            }
                        }
                        pump();
                    }).catch(function() { finishStream(sess); });
                }
                pump();
            }).catch(function() { finishStream(sess); });
        }

        /* ===== SSE Data Handling (Session-Aware) ===== */
        function handleSSEData(sess, raw) {
            if (raw === '[DONE]') {
                console.log("Stream finished");
                finishStream(sess);
                return;
            }

            try {
                var chunk = JSON.parse(raw);
                if (sess.silenceTimer) {
                    clearTimeout(sess.silenceTimer);
                }

                removeInlineThinking(sess);

                switch (chunk.type) {
                    case 'reason': finishPendingTool(sess); appendReasonChunk(sess, chunk.text); break;
                    case 'text':   finishThinkingBlock(sess); finishPendingTool(sess); appendContentChunk(sess, chunk.text, true); break;
                    case 'action': finishThinkingBlock(sess); appendActionEndChunk(sess, chunk.toolName, chunk.text); break;
                    case 'agent':  finishThinkingBlock(sess); finishPendingTool(sess); appendContentChunk(sess, chunk.text, false); break;
                    case 'error':  finishThinkingBlock(sess); appendErrorChunk(sess, chunk.text); break;
                    case 'hitl':   finishThinkingBlock(sess); finishPendingTool(sess); appendHitlCard(sess, chunk.toolName, chunk.command); break;
                }
                sess.silenceTimer = setTimeout(function() {
                    if (sess.isStreaming && !sess.thinkingBlockEl) showInlineThinking(sess);
                }, 1000);
            } catch (e) {}
        }

        function finishStream(sess) {
            var wasStreaming = sess.isStreaming;
            sess.isStreaming = false;
            if (sess.silenceTimer) { clearTimeout(sess.silenceTimer); sess.silenceTimer = null; }

            // --- 新增：强刷逻辑，必须在 resetStreamState 之前执行 ---
            // 1. 取消还没跑的动画帧
            if (sess.contentRafId) { cancelAnimationFrame(sess.contentRafId); sess.contentRafId = null; }
            if (sess.reasonRafId) { cancelAnimationFrame(sess.reasonRafId); sess.reasonRafId = null; }

            // 2. 立即把 Buffer 内容渲染出来
            if (sess.reasonBuffer) {
                var el = ensureAssistantBubble(sess);
                el.innerHTML = renderMd(sess.reasonBuffer);
            }
            // 如果有思考中的内容，也刷一下
            if (sess.thinkingBlockEl && sess.thinkingBuffer) {
                if (sess.thinkingBodyMdEl) sess.thinkingBodyMdEl.innerHTML = renderMd(sess.thinkingBuffer);
            }
            // ---------------------------------------------------

            removeThinking(sess);
            removeInlineThinking(sess);
            finishThinkingBlock(sess);
            finishPendingTool(sess);

            if (sess.eventSource) { sess.eventSource.close(); sess.eventSource = null; }

            // resetStreamState 会清空 buffer，所以必须在上面强刷完后再调
            resetStreamState(sess);

            if (sess.sessionId === activeSessionId) {
                isStreaming = false;
                setBtnSendMode();
                // 只有在活动会话才滚动
                scrollToBottom(true);
                chatInput.focus();
            }
            loadSessionHistory();
        }
    </script>
